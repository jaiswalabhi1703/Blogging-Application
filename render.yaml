# Render Blueprint — one-click deploy of the Blogify API + managed PostgreSQL.
# In Render: New → Blueprint → connect this repo. Render reads this file and provisions
# the web service (built from the Dockerfile) and the database, wiring them together.
#
# Free tier notes:
#   - The web service sleeps after ~15 min idle and cold-starts on the next request.
#   - The free PostgreSQL instance expires ~30 days after creation (fine for a demo).
#   - Kafka/Redis stay OFF here (no free managed brokers); the app falls back to
#     synchronous notifications + an in-memory cache automatically.
services:
  - type: web
    name: blogify-api
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    healthCheckPath: /actuator/health
    autoDeploy: true
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      # Strong JWT secret generated and stored by Render (never committed).
      - key: JWT_SECRET
        generateValue: true
      # Browser origins allowed to call the API. Update if your frontend domain changes.
      - key: CORS_ALLOWED_ORIGINS
        value: https://blogify.dsa-patterns.workers.dev
      - key: AI_ENABLED
        value: "true"
      - key: AI_MODEL
        value: gpt-4o-mini
      # Set the real OpenAI key in the Render dashboard (sync:false = not in git, prompted on deploy).
      - key: OPENAI_API_KEY
        sync: false
      # --- Database wiring (pulled from the managed Postgres below) ---
      - key: DB_HOST
        fromDatabase:
          name: blogify-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: blogify-db
          property: port
      - key: DB_NAME
        fromDatabase:
          name: blogify-db
          property: database
      - key: DATABASE_USERNAME
        fromDatabase:
          name: blogify-db
          property: user
      - key: DATABASE_PASSWORD
        fromDatabase:
          name: blogify-db
          property: password

databases:
  - name: blogify-db
    plan: free
    databaseName: blog_app
    user: blog
