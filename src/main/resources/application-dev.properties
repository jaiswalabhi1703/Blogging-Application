# ============================================================
#  DEV profile - zero-setup in-memory H2 database
#  Run with: mvn spring-boot:run   (default profile is dev)
# ============================================================

spring.datasource.url=jdbc:h2:mem:blogdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# H2 web console at http://localhost:8080/h2-console (JDBC URL: jdbc:h2:mem:blogdb)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

logging.level.com.blog=DEBUG
logging.level.org.springframework.security=INFO
