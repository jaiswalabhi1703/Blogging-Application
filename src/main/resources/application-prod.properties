# ============================================================
#  PROD profile - PostgreSQL via environment variables ONLY
#  Nothing secret is committed. Every value comes from the environment.
#
#  Required env vars (see .env.example):
#    DATABASE_URL       e.g. jdbc:postgresql://host:5432/blog_app
#    DATABASE_USERNAME
#    DATABASE_PASSWORD
#    JWT_SECRET         (strong, Base64-encoded, >= 256 bits)
#    CORS_ALLOWED_ORIGINS
#    OPENAI_API_KEY  (optional - enables AI features)
# ============================================================

spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Don't auto-mutate the schema in production beyond safe additive updates.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

logging.level.root=INFO
logging.level.com.blog=INFO
