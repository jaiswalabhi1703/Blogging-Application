# ============================================================
#  Common configuration (shared across all profiles)
#  Profile-specific overrides live in application-<profile>.properties
#  Secrets are NEVER hard-coded here - they come from environment variables.
# ============================================================

spring.application.name=blog-app-apis
server.port=${SERVER_PORT:8080}

# Active profile: dev (default) | prod  -- override with SPRING_PROFILES_ACTIVE
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false

# ---- File upload limits ----
spring.servlet.multipart.file-size-threshold=10KB
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Folder where uploaded post images are stored
project.image=${PROJECT_IMAGE_PATH:images/}

# ============================================================
#  Security / JWT  (override the secret in every real environment!)
# ============================================================
# Base64-encoded HS256 secret. The bundled default is for local dev ONLY.
app.jwt.secret=${JWT_SECRET:5367566B59703373367639792F423F4528482B4D6251655468576D5A71347437}
app.jwt.access-token-expiration-ms=${JWT_ACCESS_EXPIRATION_MS:900000}
app.jwt.refresh-token-expiration-ms=${JWT_REFRESH_EXPIRATION_MS:604800000}

# Comma-separated list of allowed CORS origins (frontend / Cloudflare domains)
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}

# ============================================================
#  AI assistant (OpenAI)
#  Leave OPENAI_API_KEY unset to run without AI features.
# ============================================================
app.ai.enabled=${AI_ENABLED:true}
app.ai.model=${AI_MODEL:gpt-4o-mini}
app.ai.api-key=${OPENAI_API_KEY:}
app.ai.base-url=${OPENAI_BASE_URL:https://api.openai.com/v1}

# ============================================================
#  Kafka (event-driven async notifications)
#  Disabled by default so the app runs locally without a broker;
#  when disabled, notifications are produced synchronously instead.
#  docker-compose / prod set KAFKA_ENABLED=true.
# ============================================================
app.kafka.enabled=${KAFKA_ENABLED:false}
app.kafka.notifications-topic=${KAFKA_NOTIFICATIONS_TOPIC:blog.notifications}
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.consumer.group-id=${KAFKA_GROUP_ID:blog-notifications}
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer
# Don't let a missing broker block startup when Kafka is enabled
spring.kafka.listener.missing-topics-fatal=false

# ============================================================
#  Redis (cache-aside for hot posts)
#  Disabled by default -> falls back to an in-memory cache.
#  docker-compose / prod set REDIS_ENABLED=true.
# ============================================================
app.redis.enabled=${REDIS_ENABLED:false}
app.cache.post-ttl-seconds=${CACHE_POST_TTL_SECONDS:600}
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
# Only health-check Redis when we actually use it (avoids a DOWN status in dev)
management.health.redis.enabled=${REDIS_ENABLED:false}

# ============================================================
#  Actuator: expose health + info for container/orchestrator probes
# ============================================================
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when_authorized
management.info.env.enabled=true
info.app.name=Blog App APIs
info.app.description=Production-grade blogging REST API
