# ============================================================
#  TEST profile - isolated in-memory H2, AI disabled
# ============================================================

spring.datasource.url=jdbc:h2:mem:blogtest;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# Deterministic secret + AI off so tests never make network calls
app.jwt.secret=5367566B59703373367639792F423F4528482B4D6251655468576D5A71347437
app.ai.enabled=false
app.ai.api-key=

# No external brokers in tests: synchronous notifications + in-memory cache
app.kafka.enabled=false
app.redis.enabled=false
